<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>时间之窗</title>
  <link rel="icon" type="image/svg+xml" href="images/icon.svg">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/clock.css">
  <link rel="stylesheet" href="css/analog.css">
  <link rel="stylesheet" href="css/wheel.css">
  <link rel="stylesheet" href="css/matrix.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="tabs" role="tablist" aria-label="时间模式切换">
        <button class="tab active" data-tab="clock" role="tab" aria-selected="true" type="button">时之刻</button>
        <button class="tab" data-tab="analog" role="tab" aria-selected="false" type="button">时之盘</button>
        <button class="tab" data-tab="wheel" role="tab" aria-selected="false" type="button">时之轮</button>
        <button class="tab" data-tab="matrix" role="tab" aria-selected="false" type="button">时之谱</button>
      </div>
      <div class="controls">
        <button id="fullscreen" class="control-btn" type="button" aria-label="全屏切换">⛶</button>
        <a
          class="control-btn github-link"
          href="https://github.com/wanxb/time-clock"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub 仓库"
          title="GitHub"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 2C6.48 2 2 6.59 2 12.24c0 4.52 2.87 8.36 6.84 9.71.5.1.68-.22.68-.49 0-.24-.01-.89-.01-1.75-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.56 2.35 1.11 2.92.85.09-.67.35-1.11.63-1.36-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.27-.45-1.31.1-2.74 0 0 .84-.28 2.75 1.05A9.3 9.3 0 0 1 12 6.82c.85 0 1.7.12 2.5.36 1.9-1.33 2.74-1.05 2.74-1.05.55 1.43.2 2.47.1 2.74.65.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.95.68 1.92 0 1.39-.01 2.5-.01 2.84 0 .27.18.59.69.49A10.23 10.23 0 0 0 22 12.24C22 6.59 17.52 2 12 2z"/>
          </svg>
        </a>
      </div>
    </header>

    <main>
      <section id="clock" class="page active" role="tabpanel">
        <div class="row row1">
          <div id="time" aria-live="polite"></div>
        </div>

        <div class="row row2">
          <div id="solarDate"></div>
          <div id="lunarDate"></div>
          <div id="ganzhi"></div>
        </div>

        <div class="row row3">
          <div id="extraInfo"></div>
        </div>
      </section>

      <section id="wheel" class="page" role="tabpanel">
        <canvas id="wheelCanvas"></canvas>
      </section>

      <section id="analog" class="page" role="tabpanel">
        <canvas id="analogCanvas"></canvas>
      </section>

      <section id="matrix" class="page" role="tabpanel">
        <div id="matrixContainer"></div>
      </section>
    </main>
  </div>

  <script src="js/lunar.min.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/analog.js"></script>
  <script src="js/wheel.js"></script>
  <script src="js/matrix.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
